<!doctype html>
<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
      <meta name="google-signin-client_id" content="21450313655-858h0b2ho296rce67smparaoct4me9l2.apps.googleusercontent.com">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-giJF6kkoqNQ00vy+HMDP7azOuL0xtbfIcaT9wjKHr8RbDVddVHyTfAAsrekwKmP1" crossorigin="anonymous">

<script src="https://apis.google.com/js/platform.js" async defer></script>
  </head>
  <body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="{% url 'index' %}">Adhyapna</a>
            <li><a href="{% url 'topics' %}" class="topics">Topics</a></li>
            <li><a href="{% url 'webrtc' %}" class="go">Go to Class</a></li>

            {% if user.is_authenticated %}
                        <li><a class="name" style="color: aliceblue; text-decoration: dotted;">Hello, {{ user.username }}</a></li>
                        <li><a href="{% url 'logout' %}" class="log">log out</a></li>
                    {% else %}
                        <li><a href="{% url 'register' %}" class="name">register</a></li>
                        <li><a href="{% url 'login' %}" class="log">log in</a></li>
            {% endif %}
        </div>
    </nav>

    <!-- Optional JavaScript; choose one of the two! -->

    <!-- Option 1: Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/js/bootstrap.bundle.min.js" integrity="sha384-ygbV9kiqUc6oa4msXn9868pTtWMgiQaeYH7/t7LECLbyPA2x65Kgf80OJFdroafW" crossorigin="anonymous"></script>

    <!-- Option 2: Separate Popper and Bootstrap JS -->
    <!--
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.4/dist/umd/popper.min.js" integrity="sha384-q2kxQ16AaE6UbzuKqyBE9/u/KzioAlnx2maXQHiDX9d4/zp8Ok3f+M7DPm+Ib6IU" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/js/bootstrap.min.js" integrity="sha384-pQQkAEnwaBkjpqZ8RU1fF1AKtTcHJwFl3pblpTlHXybJjHpMYo79HY3hIi4NKxyj" crossorigin="anonymous"></script>
    -->
  <div class="container">
    <div class="page-header">
        {% block header %}{% endblock header %}
    </div>
    <div>
        {% block content %}{% endblock content %}
    </div>
</div>
  </body>
<style>
    nav.navbar.navbar-dark.bg-dark {
    margin-block-end: 44px;
}
    a.name {
        position: absolute;
        left: 1100px;
        color: aliceblue;
        text-decoration: dotted;
}
    a {
    color: aliceblue;
    text-decoration: dotted;
}
    a.topics {
    position: absolute;
    left: 200px;
}
    a.go {
    position: absolute;
    left: 300px;
}
    a:hover {
    color: aliceblue;
}
    a.log {
    position: absolute;
    left: 1250px;
}
</style>
</html>
